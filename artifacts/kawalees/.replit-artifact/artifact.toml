kind = "web"
previewPath = "/"
title = "Kawalees - كواليس"
version = "1.0.0"
id = "artifacts/kawalees"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18269

[services.development]
run = "pnpm --filter @workspace/kawalees run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kawalees", "run", "build" ]
publicDir = "artifacts/kawalees/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18269"
BASE_PATH = "/"
